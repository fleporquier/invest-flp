# Configuration du module Opportunities Scanner.
seuils:
  baisse_5j_min: -5.0        # baisse 5 jours (%) en-dessous de laquelle on retient
  baisse_1m_min: -15.0       # baisse 1 mois (%) en-dessous de laquelle on retient
  market_cap_min_musd: 2000  # capitalisation minimale, en millions USD
  volume_ratio_min: 0.8      # ratio volume 5j / 20j minimal (liquidité)

universe:
  include_us_tech: true
  include_china: true
  include_etf: true

data:
  # Source des cours : "yfinance" (réseau ouvert requis), "cache" (lit les CSV
  # committés dans cache_dir), ou "auto" (essaie yfinance puis bascule sur le cache).
  # Dans l'environnement routine en liste blanche, Yahoo est bloqué -> utiliser
  # "cache" (alimenté par le workflow GitHub Actions refresh-prices.yml).
  source: "auto"
  cache_dir: "data/prices"

claude:
  model: "claude-opus-4-7"
  max_tokens: 1000
  temperature: 0.2

output:
  top_n: 15
  # "json" alimente le dashboard (sortie auto-redactee : pas de montants, pas de quantites).
  formats: ["console", "markdown", "excel", "json"]
  output_dir: "reports/"
